<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#cc0000" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FW Lernen" />
  <link rel="manifest" href="manifest.json" />
  <title>🔥 Feuerwehr Lernapp</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:    #cc0000;
      --red-d:  #990000;
      --yellow: #ffcc00;
      --bg:     #0f0f1a;
      --bg2:    #1a1a2e;
      --bg3:    #242440;
      --text:   #e8e8f0;
      --muted:  #8888aa;
      --border: #333355;
      --green:  #22cc66;
      --blue:   #4488ff;
      --radius: 10px;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    #root { height: 100%; display: flex; flex-direction: column; }

    /* ── HEADER ── */
    header {
      background: var(--red-d);
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    }
    header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; }
    header .sync-badge { font-size: 0.7rem; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; }
    header .sync-badge.ok   { background: rgba(34,204,102,0.25); color: var(--green); }
    header .sync-badge.warn { background: rgba(255,204,0,0.25); color: var(--yellow); }

    /* ── LAYOUT ── */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px; background: var(--bg2); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      transition: transform 0.25s ease;
    }
    .sidebar.hidden { transform: translateX(-100%); position: absolute; height: calc(100% - 52px); z-index: 50; }

    .search-wrap { padding: 12px; border-bottom: 1px solid var(--border); }
    .search-wrap input {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: var(--radius); padding: 8px 12px; font-size: 0.9rem;
    }
    .search-wrap input:focus { outline: none; border-color: var(--red); }

    .nav { flex: 1; overflow-y: auto; padding: 8px 0; }
    .nav-section { margin-bottom: 4px; }
    .nav-section-title {
      padding: 8px 14px; font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--muted);
    }
    .nav-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 14px; cursor: pointer; font-size: 0.88rem;
      border-radius: 6px; margin: 0 6px; transition: background 0.15s;
      position: relative;
    }
    .nav-item:hover   { background: var(--bg3); }
    .nav-item.active  { background: var(--red-d); color: #fff; }
    .nav-item .count  { margin-left: auto; font-size: 0.72rem; color: var(--muted); background: var(--bg3); padding: 1px 6px; border-radius: 10px; }
    .nav-item.active .count { background: rgba(255,255,255,0.2); color: #fff; }
    .nav-item.sub     { padding-left: 30px; font-size: 0.83rem; }
    .nav-item.sub-sub { padding-left: 46px; font-size: 0.8rem; color: var(--muted); }
    .nav-item.sub-sub.active { color: #fff; }

    .progress-bar-wrap { padding: 12px 14px; border-top: 1px solid var(--border); }
    .progress-label { font-size: 0.75rem; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .progress-bar { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: var(--red); border-radius: 3px; transition: width 0.4s ease; }

    /* ── MAIN ── */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .toolbar {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 14px; border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }
    .toolbar-title { flex: 1; font-size: 0.95rem; font-weight: 600; }
    .toolbar button {
      background: var(--bg3); border: 1px solid var(--border);
      color: var(--text); border-radius: 6px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
    }
    .toolbar button:hover { background: var(--border); }
    .toolbar button.active { background: var(--red-d); border-color: var(--red); }
    .hamburger { display: none; background: none; border: none; color: var(--text); font-size: 1.4rem; cursor: pointer; }

    .content { flex: 1; overflow-y: auto; padding: 16px; }

    /* ── POST LIST ── */
    .post-grid { display: flex; flex-direction: column; gap: 10px; }
    .post-card {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 16px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; flex-direction: column; gap: 6px;
    }
    .post-card:hover { border-color: var(--red); background: var(--bg3); }
    .post-card.read { border-left: 3px solid var(--green); }
    .post-card.bookmarked { border-left: 3px solid var(--yellow); }
    .post-card.read.bookmarked { border-left: 3px solid var(--blue); }
    .post-card h3 { font-size: 0.95rem; font-weight: 600; line-height: 1.3; }
    .post-card .meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag { font-size: 0.7rem; padding: 2px 7px; border-radius: 10px; background: var(--bg3); color: var(--muted); }
    .tag.red { background: rgba(204,0,0,0.2); color: #ff6666; }
    .post-card .lead { font-size: 0.82rem; color: var(--muted); line-height: 1.4; }
    .post-card .actions { display: flex; gap: 8px; margin-top: 4px; }
    .post-card .actions button {
      font-size: 0.75rem; padding: 3px 10px; border-radius: 6px;
      border: 1px solid var(--border); background: var(--bg3); color: var(--text); cursor: pointer;
    }
    .post-card .actions button:hover { background: var(--border); }
    .post-card .actions button.done { background: rgba(34,204,102,0.15); border-color: var(--green); color: var(--green); }
    .post-card .actions button.starred { background: rgba(255,204,0,0.15); border-color: var(--yellow); color: var(--yellow); }

    /* ── POST DETAIL ── */
    .post-detail { max-width: 720px; }
    .post-detail h2 { font-size: 1.3rem; margin-bottom: 12px; line-height: 1.3; }
    .post-detail .body { font-size: 0.92rem; line-height: 1.7; color: var(--text); }
    .post-detail .body h3 { margin: 16px 0 6px; font-size: 1rem; }
    .post-detail .body p  { margin-bottom: 10px; }
    .post-detail .body ul { margin: 8px 0 10px 20px; }
    .post-detail .body li { margin-bottom: 4px; }
    .detail-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .detail-toolbar button {
      padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
      background: var(--bg3); color: var(--text); font-size: 0.85rem; cursor: pointer;
    }
    .detail-toolbar button:hover   { background: var(--border); }
    .detail-toolbar button.done    { background: rgba(34,204,102,0.2); border-color: var(--green); color: var(--green); }
    .detail-toolbar button.starred { background: rgba(255,204,0,0.2); border-color: var(--yellow); color: var(--yellow); }
    .attachments { margin-top: 20px; }
    .attachments h4 { font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .attachment-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--bg3); border-radius: 8px;
      margin-bottom: 6px; text-decoration: none; color: var(--text);
      border: 1px solid var(--border); transition: border-color 0.15s;
    }
    .attachment-item:hover { border-color: var(--red); }
    .attachment-icon { font-size: 1.4rem; }
    .attachment-info { flex: 1; }
    .attachment-info .name { font-size: 0.88rem; font-weight: 600; }
    .attachment-info .type { font-size: 0.72rem; color: var(--muted); }

    /* ── EMPTY / LOADING ── */
    .center { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 12px; color: var(--muted); text-align: center; padding: 32px; }
    .center .icon { font-size: 3rem; }
    .spinner { width: 36px; height: 36px; border: 3px solid var(--bg3); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .sidebar { width: 100%; max-width: 300px; position: absolute; height: calc(100dvh - 52px); }
      .sidebar:not(.hidden) { box-shadow: 4px 0 20px rgba(0,0,0,0.5); }
      .hamburger { display: block; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { createElement as h, useState, useEffect, useCallback, useMemo } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

// ── Lokaler Speicher für Fortschritt ──────────────────────────────────────────
const LS = {
  get: (k, fb = {}) => { try { return JSON.parse(localStorage.getItem(k) ?? 'null') ?? fb; } catch { return fb; } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v))
};

// ── Datei-Icon ────────────────────────────────────────────────────────────────
function fileIcon(mime = '', name = '') {
  const n = name.toLowerCase(), m = mime.toLowerCase();
  if (n.endsWith('.pdf') || m.includes('pdf'))  return '📄';
  if (n.endsWith('.docx') || n.endsWith('.doc') || m.includes('word')) return '📝';
  if (n.endsWith('.pptx') || n.endsWith('.ppt') || m.includes('powerpoint')) return '📊';
  if (n.endsWith('.xlsx') || n.endsWith('.xls') || m.includes('excel')) return '📊';
  if (m.includes('video')) return '🎬';
  if (m.includes('image')) return '🖼️';
  if (m.includes('zip'))   return '🗜️';
  return '📎';
}

// ── Hauptapp ──────────────────────────────────────────────────────────────────
function App() {
  const BASE = location.hostname === 'localhost' ? '' : '/feuerwehr';

  const [loading, setLoading]       = useState(true);
  const [error, setError]           = useState(null);
  const [tags, setTags]             = useState([]);
  const [topics, setTopics]         = useState([]);
  const [posts, setPosts]           = useState([]);
  const [filesIndex, setFilesIndex] = useState([]);
  const [manifest, setManifest]     = useState(null);

  const [activeTag, setActiveTag]   = useState(null);   // Tag-ID oder null
  const [activeTopic, setActiveTopic] = useState(null); // Topic-ID oder null
  const [selectedPost, setSelectedPost] = useState(null);
  const [filter, setFilter]         = useState('all');  // all | unread | bookmarked
  const [search, setSearch]         = useState('');
  const [sidebarOpen, setSidebarOpen] = useState(true);

  const [read, setRead]         = useState(() => LS.get('fw_read', {}));
  const [bookmarks, setBookmarks] = useState(() => LS.get('fw_bookmarks', {}));

  // Daten laden
  useEffect(() => {
    async function load() {
      try {
        const [t, tp, p, fi, m] = await Promise.all([
          fetch(`${BASE}/cache/tags.json`).then(r => r.json()),
          fetch(`${BASE}/cache/topics.json`).then(r => r.json()),
          fetch(`${BASE}/cache/posts.json`).then(r => r.json()),
          fetch(`${BASE}/cache/files_index.json`).then(r => r.json()).catch(() => []),
          fetch(`${BASE}/cache/manifest.json`).then(r => r.json()).catch(() => null),
        ]);
        setTags(t); setTopics(tp); setPosts(p); setFilesIndex(fi); setManifest(m);
      } catch(e) {
        setError('Cache nicht gefunden. Bitte erst die GitHub Action ausführen (Actions → Sync Lernbar Cache → Run workflow).');
      } finally { setLoading(false); }
    }
    load();
  }, [BASE]);

  // Fortschritt speichern
  useEffect(() => { LS.set('fw_read', read); }, [read]);
  useEffect(() => { LS.set('fw_bookmarks', bookmarks); }, [bookmarks]);

  const toggleRead     = useCallback(id => setRead(r => ({ ...r, [id]: !r[id] })), []);
  const toggleBookmark = useCallback(id => setBookmarks(b => ({ ...b, [id]: !b[id] })), []);

  // Gefilterte Posts
  const filteredPosts = useMemo(() => {
    let list = posts;

    if (activeTopic) {
      list = list.filter(p => p.topic_id === activeTopic || p.topics?.some(t => t.id === activeTopic));
    } else if (activeTag) {
      list = list.filter(p => p.tags?.some(t => {
        if (typeof t === 'string') return false; // nur wenn Tags Objekte sind
        return t.id === activeTag;
      }) || p.tag_ids?.includes(activeTag));
    }

    if (filter === 'unread')     list = list.filter(p => !read[p.id]);
    if (filter === 'bookmarked') list = list.filter(p => bookmarks[p.id]);

    if (search.trim()) {
      const q = search.toLowerCase();
      list = list.filter(p =>
        p.title?.toLowerCase().includes(q) ||
        p.lead?.toLowerCase().includes(q) ||
        p.body?.toLowerCase().includes(q)
      );
    }

    return list;
  }, [posts, activeTopic, activeTag, filter, search, read, bookmarks]);

  // Fortschrittsberechnung
  const totalRead = Object.values(read).filter(Boolean).length;
  const pct = posts.length ? Math.round(totalRead / posts.length * 100) : 0;

  // ── Render ────────────────────────────────────────────────────────────────
  if (loading) return h('div', { id: 'root' },
    h('header', null, h('h1', null, '🔥 Feuerwehr Lernapp')),
    h('div', { className: 'center' }, h('div', { className: 'spinner' }), h('p', null, 'Lade Inhalte…'))
  );

  if (error) return h('div', { id: 'root' },
    h('header', null, h('h1', null, '🔥 Feuerwehr Lernapp')),
    h('div', { className: 'center' },
      h('div', { className: 'icon' }, '⚠️'),
      h('p', { style: { maxWidth: 400 } }, error)
    )
  );

  // Sidebar: Tags-Baum + Topics
  const rootTopics = topics.filter(t => !t.parent_topic_id);

  function SidebarNav() {
    return h('nav', { className: 'nav' },
      // Spezial-Filter
      h('div', { className: 'nav-section' },
        h('div', { className: 'nav-section-title' }, 'Ansicht'),
        ['all', 'unread', 'bookmarked'].map(f =>
          h('div', {
            key: f,
            className: `nav-item${filter === f && !activeTopic && !activeTag ? ' active' : ''}`,
            onClick: () => { setFilter(f); setActiveTopic(null); setActiveTag(null); setSelectedPost(null); setSidebarOpen(false); }
          },
            f === 'all' ? '📚' : f === 'unread' ? '🔵' : '⭐',
            ' ',
            f === 'all' ? 'Alle Inhalte' : f === 'unread' ? 'Ungelesen' : 'Gemerkt',
            h('span', { className: 'count' },
              f === 'all' ? posts.length : f === 'unread' ? posts.filter(p => !read[p.id]).length : Object.values(bookmarks).filter(Boolean).length
            )
          )
        )
      ),

      // Root-Topics
      h('div', { className: 'nav-section' },
        h('div', { className: 'nav-section-title' }, 'Themenfelder'),
        rootTopics.map(topic => {
          const children = topics.filter(t => t.parent_topic_id === topic.id);
          return [
            h('div', {
              key: topic.id,
              className: `nav-item${activeTopic === topic.id ? ' active' : ''}`,
              onClick: () => { setActiveTopic(topic.id); setActiveTag(null); setSelectedPost(null); setSidebarOpen(false); }
            },
              '📂', ' ', topic.title,
              h('span', { className: 'count' }, topic.article_count ?? '')
            ),
            ...children.map(sub =>
              h('div', {
                key: sub.id,
                className: `nav-item sub${activeTopic === sub.id ? ' active' : ''}`,
                onClick: () => { setActiveTopic(sub.id); setActiveTag(null); setSelectedPost(null); setSidebarOpen(false); }
              },
                sub.title,
                h('span', { className: 'count' }, sub.article_count ?? '')
              )
            )
          ];
        }).flat()
      ),

      // Tag-Baum
      h('div', { className: 'nav-section' },
        h('div', { className: 'nav-section-title' }, 'Nach Kategorie'),
        tags.map(tag =>
          h('div', { key: tag.id },
            h('div', {
              className: `nav-item${activeTag === tag.id ? ' active' : ''}`,
              onClick: () => { setActiveTag(tag.id); setActiveTopic(null); setSelectedPost(null); setSidebarOpen(false); }
            },
              '🏷️', ' ', tag.title,
              h('span', { className: 'count' }, tag.articles_count ?? '')
            ),
            (tag.children || []).map(child =>
              h('div', {
                key: child.id,
                className: `nav-item sub${activeTag === child.id ? ' active' : ''}`,
                onClick: () => { setActiveTag(child.id); setActiveTopic(null); setSelectedPost(null); setSidebarOpen(false); }
              },
                child.title,
                h('span', { className: 'count' }, child.articles_count ?? '')
              )
            )
          )
        )
      )
    );
  }

  function PostCard({ post }) {
    const isRead = !!read[post.id];
    const isStarred = !!bookmarks[post.id];
    let cls = 'post-card';
    if (isRead && isStarred) cls += ' read bookmarked';
    else if (isRead) cls += ' read';
    else if (isStarred) cls += ' bookmarked';

    return h('div', { className: cls, onClick: () => setSelectedPost(post) },
      h('h3', null, post.title),
      post.lead && h('p', { className: 'lead' }, post.lead),
      h('div', { className: 'meta' },
        post.topic_title && h('span', { className: 'tag red' }, post.topic_title),
        ...(post.tags || []).slice(0, 3).map(t =>
          h('span', { className: 'tag', key: typeof t === 'string' ? t : t.id }, typeof t === 'string' ? t : t.title)
        )
      ),
      h('div', { className: 'actions', onClick: e => e.stopPropagation() },
        h('button', { className: isRead ? 'done' : '', onClick: () => toggleRead(post.id) }, isRead ? '✓ Gelesen' : '○ Als gelesen'),
        h('button', { className: isStarred ? 'starred' : '', onClick: () => toggleBookmark(post.id) }, isStarred ? '★ Gemerkt' : '☆ Merken')
      )
    );
  }

  function PostDetail({ post, onBack }) {
    const isRead = !!read[post.id];
    const isStarred = !!bookmarks[post.id];
    const postFiles = filesIndex.filter(f => f.post_slug === post.slug);

    return h('div', { className: 'post-detail' },
      h('div', { className: 'detail-toolbar' },
        h('button', { onClick: onBack }, '← Zurück'),
        h('button', { className: isRead ? 'done' : '', onClick: () => toggleRead(post.id) }, isRead ? '✓ Gelesen' : '○ Als gelesen'),
        h('button', { className: isStarred ? 'starred' : '', onClick: () => toggleBookmark(post.id) }, isStarred ? '★ Gemerkt' : '☆ Merken')
      ),
      h('h2', null, post.title),
      post.lead && h('p', { style: { color: 'var(--muted)', marginBottom: 16, fontSize: '0.95rem' } }, post.lead),
      h('div', { className: 'meta', style: { marginBottom: 16 } },
        post.topic_title && h('span', { className: 'tag red' }, post.topic_title),
        ...(post.tags || []).map(t =>
          h('span', { className: 'tag', key: typeof t === 'string' ? t : t.id }, typeof t === 'string' ? t : t.title)
        )
      ),
      post.body && h('div', { className: 'body', dangerouslySetInnerHTML: { __html: post.body } }),
      (postFiles.length > 0 || (post.attachments || []).length > 0) && h('div', { className: 'attachments' },
        h('h4', null, '📎 Dateien'),
        ...[...postFiles, ...(post.attachments || [])].map((f, i) => {
          const url = f.local_file ? `${BASE}/cache/files/${f.local_file}` : (f.url || f.file_url);
          const name = f.local_file || f.title || f.name || 'Datei';
          const mime = f.type || f.mime_type || '';
          return h('a', { key: i, href: url, target: '_blank', rel: 'noopener', className: 'attachment-item' },
            h('span', { className: 'attachment-icon' }, fileIcon(mime, name)),
            h('div', { className: 'attachment-info' },
              h('div', { className: 'name' }, f.title || name),
              h('div', { className: 'type' }, mime || name.split('.').pop()?.toUpperCase() || 'Datei')
            ),
            h('span', null, '↗')
          );
        })
      )
    );
  }

  const syncDate = manifest?.synced_at ? new Date(manifest.synced_at).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }) : null;
  const isOld = manifest?.synced_at && (Date.now() - new Date(manifest.synced_at)) > 7 * 24 * 3600000;

  const currentTitle = activeTopic
    ? topics.find(t => t.id === activeTopic)?.title ?? 'Thema'
    : activeTag
      ? (tags.flatMap(t => [t, ...(t.children||[])]).find(t => t.id === activeTag)?.title ?? 'Kategorie')
      : filter === 'bookmarked' ? 'Gemerkte Inhalte' : filter === 'unread' ? 'Ungelesen' : 'Alle Inhalte';

  return h('div', { style: { display:'flex', flexDirection:'column', height:'100dvh' } },
    h('header', null,
      h('button', { className: 'hamburger', onClick: () => setSidebarOpen(o => !o) }, '☰'),
      h('h1', null, '🔥 Feuerwehr Lernapp'),
      syncDate && h('span', { className: `sync-badge ${isOld ? 'warn' : 'ok'}` }, isOld ? `⚠ ${syncDate}` : `✓ ${syncDate}`)
    ),
    h('div', { className: 'layout' },
      h('div', { className: `sidebar${sidebarOpen ? '' : ' hidden'}` },
        h('div', { className: 'search-wrap' },
          h('input', { placeholder: '🔍 Suchen…', value: search, onChange: e => setSearch(e.target.value) })
        ),
        SidebarNav(),
        h('div', { className: 'progress-bar-wrap' },
          h('div', { className: 'progress-label' },
            h('span', null, 'Fortschritt'),
            h('span', null, `${totalRead} / ${posts.length}`)
          ),
          h('div', { className: 'progress-bar' },
            h('div', { className: 'progress-bar-fill', style: { width: `${pct}%` } })
          )
        )
      ),
      h('div', { className: 'main' },
        h('div', { className: 'toolbar' },
          h('span', { className: 'toolbar-title' }, selectedPost ? selectedPost.title : `${currentTitle} (${filteredPosts.length})`),
          !selectedPost && ['all','unread','bookmarked'].map(f =>
            h('button', { key: f, className: filter === f ? 'active' : '', onClick: () => setFilter(f) },
              f === 'all' ? 'Alle' : f === 'unread' ? 'Ungelesen' : '⭐'
            )
          )
        ),
        h('div', { className: 'content' },
          selectedPost
            ? h(PostDetail, { post: selectedPost, onBack: () => setSelectedPost(null) })
            : filteredPosts.length === 0
              ? h('div', { className: 'center' }, h('div', { className: 'icon' }, '📭'), h('p', null, 'Keine Inhalte gefunden'))
              : h('div', { className: 'post-grid' }, filteredPosts.map(p => h(PostCard, { key: p.id, post: p })))
        )
      )
    )
  );
}

createRoot(document.getElementById('root')).render(h(App));

// Service Worker registrieren
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
